<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f2f2f2;
}

/* Background Logo */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:url("{{ url_for('static', filename='logo.png') }}");
background-size:contain;
background-position:center;
background-repeat:no-repeat;

opacity:0.15;
z-index:-1;
}

/* Login container */
.login-container{
background:rgba(255,255,255,0.9);
padding:35px;
width:320px;
border-radius:10px;
box-shadow:0px 0px 15px rgba(0,0,0,0.3);
text-align:center;
transition:0.3s;
}

/* Hover effect */
.login-container:hover{
transform:scale(1.02);
box-shadow:0px 0px 25px rgba(0,0,0,0.4);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
transition:0.3s;
}

input:hover{
border:1px solid #004aad;
}

input:focus{
outline:none;
border:1px solid #004aad;
box-shadow:0px 0px 5px rgba(0,74,173,0.5);
}

button{
width:100%;
padding:10px;
background:#004aad;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#002f7a;
transform:scale(1.03);
}

</style>

</head>

<body>

<div class="login-container">

<h2>Admin Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</body>
</html>

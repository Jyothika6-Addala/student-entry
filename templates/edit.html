<!DOCTYPE html>
<html>
<head>

<title>Edit Student</title>

<style>

body{
font-family:Arial;
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* Background logo */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:url("{{ url_for('static', filename='logo.png') }}");
background-size:contain;
background-position:center;
background-repeat:no-repeat;

opacity:0.08;
z-index:-1;
}

/* Form container */

.form-box{
background:white;
padding:35px;
width:400px;
border-radius:10px;
box-shadow:0px 0px 20px rgba(0,0,0,0.3);
text-align:center;
transition:0.3s;
}

.form-box:hover{
transform:scale(1.02);
box-shadow:0px 0px 30px rgba(0,0,0,0.4);
}

h2{
margin-bottom:20px;
}

/* Inputs */

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
transition:0.3s;
}

input:focus{
outline:none;
border:1px solid #004aad;
box-shadow:0px 0px 5px rgba(0,74,173,0.5);
}

/* Button */

button{
width:100%;
padding:10px;
background:#004aad;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

button:hover{
background:#002f7a;
transform:scale(1.03);
}

</style>

</head>

<body>

<div class="form-box">

<h2>Edit Student</h2>

<form method="POST">

<input type="text" name="name" value="{{student[1]}}" required>

<input type="text" name="phone1" value="{{student[2]}}" required>

<input type="text" name="phone2" value="{{student[3]}}">

<input type="text" name="phone3" value="{{student[4]}}">

<input type="text" name="course" value="{{student[6]}}">

<input type="text" name="place" value="{{student[7]}}">

<input type="text" name="school" value="{{student[8]}}">

<input type="text" name="busnumber" value="{{student[9]}}">

<input type="text" name="reference" value="{{student[10]}}">

<input type="text" name="reference_department" value="{{student[11]}}">

<button type="submit">Update Student</button>

</form>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>

<style>
.dashboard-btn{
position:absolute;
top:20px;
right:30px;
background:#004aad;
color:white;
padding:10px 15px;
border-radius:5px;
text-decoration:none;
font-weight:bold;
}

.dashboard-btn:hover{
background:#002f7a;
}
body{
margin:0;
padding:0;
font-family: Arial, sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* Logo background */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:url("{{ url_for('static', filename='logo.png') }}");
background-size:contain;
background-position:center;
background-repeat:no-repeat;

opacity:0.12;
z-index:-1;
}

/* Form container */
.form-container{
background:white;
padding:35px;
width:420px;
border-radius:10px;
box-shadow:0px 0px 15px rgba(0,0,0,0.3);
text-align:center;
}

/* Inputs */
input, select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

/* Hover effect */
input:hover, select:hover{
border-color:#004aad;
}

/* Button */
button{
width:100%;
padding:10px;
background:#004aad;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#002f7a;
}

</style>

</head>

<body>

<div class="form-container">

<h2>Student Registration Form</h2>

<!-- Popup message -->
{% with messages = get_flashed_messages() %}
{% if messages %}
<script>
alert("{{ messages[0] }}");
</script>
{% endif %}
{% endwith %}

<form method="POST">

<input type="text" name="name" placeholder="Student Name" required>

<!-- Father Phone -->
<input type="tel"
name="phone1"
placeholder="Father Phone Number"
pattern="[6-9]{1}[0-9]{9}"
maxlength="10"
inputmode="numeric"
title="Enter a valid 10-digit Indian phone number"
required>

<!-- Phone 2 -->
<input type="tel"
name="phone2"
placeholder="Phone Number 2"
pattern="[6-9]{1}[0-9]{9}"
maxlength="10"
inputmode="numeric"
title="Enter a valid 10-digit Indian phone number">

<!-- Reference Phone -->
<input type="tel"
name="phone3"
placeholder="Reference Phone Number"
pattern="[6-9]{1}[0-9]{9}"
maxlength="10"
inputmode="numeric"
title="Enter a valid 10-digit Indian phone number">

<input type="number" id="hallticket" name="hallticket" placeholder="Hall Ticket Number" required>

<p id="hallticket-msg" style="color:red;font-size:14px;"></p>

<!-- Course Dropdown -->
<select name="course" required>
<option value="">Select Course</option>
<option value="CME">Computer Engineering (CME)</option>
<option value="AIML">Artificial Intelligence & Machine Learning (AIML)</option>
<option value="ECE">Electronics & Communication Engineering (ECE)</option>
<option value="EEE">Electrical & Electronics Engineering (EEE)</option>
<option value="ME">Mechanical Engineering (ME)</option>
<option value="CIVIL">Civil Engineering</option>
</select>

<input type="text" name="place" placeholder="Place" required>

<input type="text" name="school" placeholder="School" required>

<input type="text" name="busnumber" placeholder="Bus Number">

<input type="text" name="reference" placeholder="Reference" required>

<!-- Reference Department -->
<select name="reference_department" required>
<option value="">Select Reference Department</option>
<option value="POLY STUDENT">Poly Student</option>
<option value="POLY STAFF">Polytechnic Staff</option>
<option value="CSE">CSE Department</option>
<option value="IT">IT Department</option>
<option value="AIML">AIML Department</option>
<option value="ECE">ECE Department</option>
<option value="EEE">EEE Department</option>
<option value="MECH">Mechanical Department</option>
<option value="CIVIL">Civil Department</option>
<option value="ADMIN">Administration</option>
</select>

<button type="submit">Submit</button>

</form>

</div>

<!-- Hallticket Live Check -->
<script>

document.getElementById("hallticket").addEventListener("keyup", function(){

let hallticket = this.value;

if(hallticket.length == 0) return;

fetch("/check-hallticket",{
method:"POST",
headers:{
"Content-Type":"application/x-www-form-urlencoded"
},
body:"hallticket="+hallticket
})
.then(response=>response.json())
.then(data=>{

if(data.exists){
document.getElementById("hallticket-msg").innerHTML =
"Hallticket number is already entered";
}else{
document.getElementById("hallticket-msg").innerHTML = "";
}

});

});

</script>
<a href="/admin-login" class="dashboard-btn">Go to Dashboard</a>
</body>
</html>

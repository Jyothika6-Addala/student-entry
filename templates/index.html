<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* Logo background */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("{{ url_for('static', filename='logo.png') }}");
background-size:contain;
background-position:center;
background-repeat:no-repeat;
opacity:0.08;
z-index:-1;
}

/* Form container */

.form-container{
background:white;
padding:35px;
width:420px;
border-radius:10px;
box-shadow:0px 5px 20px rgba(0,0,0,0.25);
text-align:center;
transition:0.3s;
}

.form-container:hover{
transform:scale(1.02);
box-shadow:0px 8px 25px rgba(0,0,0,0.35);
}

input,select{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
transition:0.3s;
}

input:focus{
outline:none;
border:1px solid #004aad;
box-shadow:0px 0px 5px rgba(0,74,173,0.5);
}

/* Buttons */

button{
width:100%;
padding:10px;
background:#004aad;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#002f7a;
transform:scale(1.03);
}

.dashboard-btn{
background:#28a745;
margin-bottom:10px;
}

.dashboard-btn:hover{
background:#1f8a36;
}

.message{
margin-bottom:10px;
color:red;
}

</style>
</head>

<body>

<div class="form-container">

<h2>Student Registration Form</h2>

<a href="/admin-login">
<button class="dashboard-btn">Go to Dashboard</button>
</a>

{% with messages = get_flashed_messages() %}
{% if messages %}
<div class="message">{{ messages[0] }}</div>
{% endif %}
{% endwith %}

<form method="POST">

<input type="text" name="name" placeholder="Student Name" required>

<input type="tel" name="phone1" placeholder="Phone Number 1"
pattern="[6-9]{1}[0-9]{9}" maxlength="10" required>

<input type="tel" name="phone2" placeholder="Phone Number 2"
pattern="[6-9]{1}[0-9]{9}" maxlength="10">

<input type="tel" name="phone3" placeholder="Reference Phone number"
pattern="[6-9]{1}[0-9]{9}" maxlength="10">

<input type="text" name="hallticket" id="hallticket"
placeholder="Hallticket Number"
onkeyup="checkHallticket()" required>

<div id="hallticket-message"></div>

<select name="course" required>
<option value="">Select Course</option>
<option value="CSE">CME</option>
<option value="AIML">AIML</option>
<option value="ECE">ECE</option>
<option value="EEE">EEE</option>
<option value="MECH">MECH</option>
</select>

<input type="text" name="place" placeholder="Place" required>

<input type="text" name="school" placeholder="School" required>

<input type="text" name="busnumber" placeholder="Bus Number">

<input type="text" name="reference" placeholder="Reference">

<select name="reference_department" required>
<option value="">Reference Department</option>
<option value="POLY">POLY</option>
<option value="POLYSTUDENT">POLY STUDENT</option>
<option value="CSE">CSE</option>
<option value="AIML">AIML</option>
<option value="IT">IT</option>
<option value="ECE">ECE</option>
<option value="EEE">EEE</option>
<option value="MECH">MECH</option>
<option value="ADMIN">ADMIN</option>
</select>

<button type="submit">Submit</button>

</form>

</div>

<script>

function checkHallticket(){

let hallticket = document.getElementById("hallticket").value;

if(hallticket.length < 3){
document.getElementById("hallticket-message").innerHTML = "";
return;
}

fetch("/check-hallticket", {

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:"hallticket="+hallticket

})

.then(response => response.json())

.then(data => {

if(data.exists){

document.getElementById("hallticket-message").innerHTML =
"<span style='color:red'>Hallticket already submitted</span>";

}else{

document.getElementById("hallticket-message").innerHTML =
"<span style='color:green'>Hallticket Number </span>";

}

});

}

</script>
</body>
</html>

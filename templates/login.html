<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
margin:0;
padding:0;
font-family: Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* Logo Background */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:url("{{ url_for('static', filename='logo.png') }}");
background-size:contain;
background-position:center;
background-repeat:no-repeat;

opacity:0.12;
z-index:-1;
}

.login-box{
width:350px;
background:white;
padding:35px;
border-radius:10px;
box-shadow:0px 0px 15px rgba(0,0,0,0.3);
text-align:center;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
background:#004aad;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#002f7a;
}

.admin-link{
margin-top:15px;
display:block;
text-decoration:none;
color:#004aad;
}

.admin-link:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Staff Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<a class="admin-link" href="/admin-login">Admin Login</a>

</div>

</body>
</html>
